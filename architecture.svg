<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SimplAI AU — Sales Pipeline Architecture</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#64748b">OpenClaw + MiroFish Integration</text>

  <!-- ============================================ -->
  <!-- STAGE 1: OPENCLAW - Lead Gathering -->
  <!-- ============================================ -->
  <rect x="30" y="90" width="740" height="340" rx="10" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="40" y="82" width="280" height="22" rx="4" fill="#3b82f6"/>
  <text x="50" y="97" font-size="12" font-weight="600" fill="#ffffff">STAGE 1: OpenClaw — Lead Gathering</text>

  <!-- Agent boxes (parallel) -->
  <rect x="60" y="125" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent: Apollo</text>
  <text x="135" y="170" text-anchor="middle" font-size="10" fill="#3b82f6">Lead database search</text>

  <rect x="230" y="125" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent: LinkedIn</text>
  <text x="305" y="170" text-anchor="middle" font-size="10" fill="#3b82f6">Professional network</text>

  <rect x="400" y="125" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="475" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent: Web Scrape</text>
  <text x="475" y="170" text-anchor="middle" font-size="10" fill="#3b82f6">Public web sources</text>

  <rect x="570" y="125" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="645" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Agent: Referral</text>
  <text x="645" y="170" text-anchor="middle" font-size="10" fill="#3b82f6">Partner referrals</text>

  <!-- Parallel indicator -->
  <text x="390" y="118" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">asyncio.gather() — all agents run in parallel</text>

  <!-- Arrows from agents down to evaluation -->
  <line x1="135" y1="195" x2="135" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="305" y1="195" x2="305" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="475" y1="195" x2="475" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="645" y1="195" x2="645" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Merge point -->
  <rect x="280" y="245" width="220" height="35" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="390" y="267" text-anchor="middle" font-size="11" fill="#1e40af">Merge All Leads (~24 raw)</text>

  <!-- Arrow to evaluator -->
  <line x1="390" y1="280" x2="390" y2="310" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Deterministic Evaluator -->
  <rect x="180" y="315" width="420" height="95" rx="8" fill="#1e40af" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="390" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Deterministic Evaluator</text>
  <text x="390" y="360" text-anchor="middle" font-size="10" fill="#bfdbfe">Authenticity check · Email validation · Deduplication</text>
  <text x="390" y="375" text-anchor="middle" font-size="10" fill="#bfdbfe">Industry relevance · Company size threshold</text>
  <text x="390" y="390" text-anchor="middle" font-size="10" fill="#bfdbfe">Relevance scoring (title seniority + size + industry)</text>

  <!-- ============================================ -->
  <!-- STAGE 2: DISCOVERY CALL ASSISTANT -->
  <!-- ============================================ -->
  <rect x="30" y="450" width="560" height="280" rx="10" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="40" y="442" width="320" height="22" rx="4" fill="#10b981"/>
  <text x="50" y="457" font-size="12" font-weight="600" fill="#ffffff">STAGE 2: Discovery Call Assistant — RAG Pipeline</text>

  <!-- Transcript input -->
  <rect x="60" y="480" width="160" height="55" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="140" y="503" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Call Transcript</text>
  <text x="140" y="520" text-anchor="middle" font-size="10" fill="#10b981">Voice-to-text input</text>

  <!-- Arrow -->
  <line x1="220" y1="507" x2="260" y2="507" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- RAG Retrieval -->
  <rect x="270" y="480" width="160" height="55" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="503" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">RAG Retrieval</text>
  <text x="350" y="520" text-anchor="middle" font-size="10" fill="#10b981">Keyword similarity match</text>

  <!-- Arrow -->
  <line x1="430" y1="507" x2="460" y2="507" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Past Meetings DB -->
  <rect x="140" y="555" width="180" height="50" rx="8" fill="#065f46" stroke="#064e3b" stroke-width="1.5"/>
  <text x="230" y="576" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Past Meetings Datastore</text>
  <text x="230" y="592" text-anchor="middle" font-size="10" fill="#6ee7b7">Growing — adds after each analysis</text>

  <!-- Arrow from datastore to RAG -->
  <line x1="280" y1="555" x2="330" y2="535" stroke="#10b981" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-emerald)"/>

  <!-- Insight Engine -->
  <rect x="60" y="625" width="510" height="85" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="315" y="648" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Insight Generation</text>
  <rect x="75" y="658" width="110" height="28" rx="4" fill="#d1fae5"/>
  <text x="130" y="676" text-anchor="middle" font-size="9" fill="#065f46">Deal Risks</text>
  <rect x="195" y="658" width="110" height="28" rx="4" fill="#d1fae5"/>
  <text x="250" y="676" text-anchor="middle" font-size="9" fill="#065f46">Objection Patterns</text>
  <rect x="315" y="658" width="110" height="28" rx="4" fill="#d1fae5"/>
  <text x="370" y="676" text-anchor="middle" font-size="9" fill="#065f46">Coaching Tips</text>
  <rect x="435" y="658" width="120" height="28" rx="4" fill="#d1fae5"/>
  <text x="495" y="676" text-anchor="middle" font-size="9" fill="#065f46">Sentiment Analysis</text>

  <!-- Arrow from analysis output box down to insight -->
  <line x1="315" y1="535" x2="315" y2="625" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- ============================================ -->
  <!-- STAGE 3: MIROFISH - Training Scenarios -->
  <!-- ============================================ -->
  <rect x="620" y="450" width="550" height="280" rx="10" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="630" y="442" width="310" height="22" rx="4" fill="#8b5cf6"/>
  <text x="640" y="457" font-size="12" font-weight="600" fill="#ffffff">STAGE 3: MiroFish — Training Scenario Simulation</text>

  <!-- Persona Pool -->
  <rect x="650" y="480" width="160" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="730" y="503" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Persona Pool</text>
  <text x="730" y="520" text-anchor="middle" font-size="10" fill="#8b5cf6">6 customer archetypes</text>

  <!-- Scenario Templates -->
  <rect x="650" y="555" width="160" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="730" y="578" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Scenario Templates</text>
  <text x="730" y="595" text-anchor="middle" font-size="10" fill="#8b5cf6">10 across 4 categories</text>

  <!-- Arrows to generator -->
  <line x1="810" y1="507" x2="860" y2="545" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="810" y1="582" x2="860" y2="555" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Scenario Generator -->
  <rect x="870" y="520" width="180" height="65" rx="8" fill="#5b21b6" stroke="#4c1d95" stroke-width="1.5"/>
  <text x="960" y="546" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Scenario Generator</text>
  <text x="960" y="565" text-anchor="middle" font-size="10" fill="#c4b5fd">Filter by category</text>
  <text x="960" y="579" text-anchor="middle" font-size="10" fill="#c4b5fd">+ difficulty level</text>

  <!-- Output -->
  <rect x="870" y="610" width="180" height="55" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="960" y="633" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Training Output</text>
  <text x="960" y="650" text-anchor="middle" font-size="10" fill="#8b5cf6">Conversations + coaching</text>

  <line x1="960" y1="585" x2="960" y2="610" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Categories list -->
  <rect x="650" y="635" width="190" height="75" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="660" y="653" font-size="10" font-weight="600" fill="#5b21b6">Categories:</text>
  <text x="660" y="668" font-size="9" fill="#7c3aed">Objection Handling · Negotiation</text>
  <text x="660" y="681" font-size="9" fill="#7c3aed">Discovery · Closing</text>
  <text x="660" y="697" font-size="10" font-weight="600" fill="#5b21b6">Difficulty: Easy · Medium · Hard</text>

  <!-- ============================================ -->
  <!-- CROSS-PIPELINE CONNECTION -->
  <!-- ============================================ -->
  <!-- Arrow from Evaluator output to Discovery (qualified leads feed into calls) -->
  <line x1="390" y1="410" x2="390" y2="435" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="395" y="430" font-size="9" fill="#64748b">Qualified leads enter sales calls</text>

  <!-- Arrow from MiroFish to Discovery (scenarios inform call preparation) -->
  <path d="M 870 665 Q 700 780 315 710" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="600" y="760" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Simulated scenarios inform real call preparation</text>

  <!-- Arrow from Discovery insights back to MiroFish (real call data improves scenarios) -->
  <path d="M 560 660 Q 610 700 650 660" fill="none" stroke="#475569" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="615" y="695" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Real insights</text>
  <text x="615" y="707" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">feed back</text>

  <!-- ============================================ -->
  <!-- API LAYER -->
  <!-- ============================================ -->
  <rect x="790" y="90" width="380" height="340" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="800" y="82" width="180" height="22" rx="4" fill="#475569"/>
  <text x="810" y="97" font-size="12" font-weight="600" fill="#ffffff">FastAPI — /docs (Swagger)</text>

  <text x="810" y="125" font-size="11" font-weight="700" fill="#1e40af">OpenClaw Endpoints</text>
  <text x="810" y="142" font-size="10" fill="#475569" font-family="monospace">POST /api/openclaw/run</text>
  <text x="810" y="157" font-size="10" fill="#475569" font-family="monospace">GET  /api/openclaw/agents</text>
  <text x="810" y="172" font-size="10" fill="#475569" font-family="monospace">GET  /api/openclaw/leads/{id}</text>

  <line x1="810" y1="182" x2="1140" y2="182" stroke="#e2e8f0" stroke-width="1"/>

  <text x="810" y="200" font-size="11" font-weight="700" fill="#065f46">Discovery Endpoints</text>
  <text x="810" y="217" font-size="10" fill="#475569" font-family="monospace">GET  /api/discovery/transcripts</text>
  <text x="810" y="232" font-size="10" fill="#475569" font-family="monospace">GET  /api/discovery/transcripts/{id}</text>
  <text x="810" y="247" font-size="10" fill="#475569" font-family="monospace">POST /api/discovery/analyze/{id}</text>
  <text x="810" y="262" font-size="10" fill="#475569" font-family="monospace">GET  /api/discovery/datastore</text>

  <line x1="810" y1="272" x2="1140" y2="272" stroke="#e2e8f0" stroke-width="1"/>

  <text x="810" y="290" font-size="11" font-weight="700" fill="#5b21b6">MiroFish Endpoints</text>
  <text x="810" y="307" font-size="10" fill="#475569" font-family="monospace">GET  /api/mirofish/personas</text>
  <text x="810" y="322" font-size="10" fill="#475569" font-family="monospace">GET  /api/mirofish/personas/{id}</text>
  <text x="810" y="337" font-size="10" fill="#475569" font-family="monospace">POST /api/mirofish/generate</text>
  <text x="810" y="352" font-size="10" fill="#475569" font-family="monospace">GET  /api/mirofish/scenarios/{id}</text>

  <line x1="810" y1="362" x2="1140" y2="362" stroke="#e2e8f0" stroke-width="1"/>

  <text x="810" y="380" font-size="11" font-weight="700" fill="#475569">General</text>
  <text x="810" y="397" font-size="10" fill="#475569" font-family="monospace">GET  /</text>
  <text x="810" y="412" font-size="10" fill="#475569" font-family="monospace">GET  /api/pipeline/overview</text>

  <!-- ============================================ -->
  <!-- FOOTER -->
  <!-- ============================================ -->
  <rect x="30" y="830" width="1140" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="852" text-anchor="middle" font-size="11" fill="#64748b">
    Tech Stack: Python 3.11+ · FastAPI · Pydantic v2 · Uvicorn · asyncio  |  All data is mock for demo purposes
  </text>
  <text x="600" y="870" text-anchor="middle" font-size="11" fill="#94a3b8">SimplAI AU — April 2026</text>
</svg>
